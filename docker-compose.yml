version: '3.8'

services:
  api:
    build: .
    container_name: python_server
    ports:
      - "8000:8000"
    volumes:
      # Map thư mục hiện tại vào container để khi sửa code ở máy thật, code trong container cũng update
      - .:/app
    # Lệnh chạy với --reload để server tự khởi động lại khi bạn sửa file app.py
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
